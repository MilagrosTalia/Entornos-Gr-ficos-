<!-- La diferencia esta en como distribuye las celdas y juegan con los atributos rowspan y colspan haciendo que 
 Tabla 1 - Primer tr : contiene tres celdas pero la primera tiene por el ROWSPAN tiene dos filas
           Segundo tr : es la segunda fila de la tabla que contiene dos celdas (y la primer celda es el del rowspan)

Tabla 2 - Primer tr: tiene un colpsan que hace que se unan dos celdas
          Segundo tr: tiene tres celdas
        
 -->
<body>
  <table width="200">
    <tr>
      <td colspan="3">
        <div align="center">Título</div>
      </td>
    </tr>
    <tr>
      <td rowspan="2" bgcolor="#dddddd">&nbsp;</td>
      <td bgcolor="#dddddd">&nbsp;</td>
      <td bgcolor="#dddddd">&nbsp;</td>
    </tr>
    <tr>
      <td bgcolor="#dddddd">&nbsp;</td>
      <td bgcolor="#dddddd">&nbsp;</td>
    </tr>
  </table>

  <br>
  <br>

  <table width="200">
    <tr>
      <td colspan="3">
        <div align="center">Título</div>
      </td>
    </tr>
    <tr>
      <td colspan="2" bgcolor="#dddddd">&nbsp;</td>
      <td bgcolor="#dddddd">&nbsp;</td>
    </tr>
    <tr>
      <td bgcolor="#dddddd">&nbsp;</td>
      <td bgcolor="#dddddd">&nbsp;</td>
      <td bgcolor="#dddddd">&nbsp;</td>
    </tr>
  </table>
</body>
</html>
