<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>
<body>

  <!-- La diferencia esta en como trabajan borde, 
   Tabla 1: tiene un border = 1
   Tabla 2: tiene un border = 1 pero contienen 
      cellpadding="0" — espacio entre el contenido de la celda y su borde interior 
      y ellspacing="0" — espacio entre las celdas entre sí (como el margin entre celdas) -->
      
  <table width="200" border="1">
    <tr>
      <td colspan="3">
        <div align="center">Título</div>
      </td>
    </tr>
    <tr>
      <td colspan="2" rowspan="2">&nbsp;</td>
      <td>&nbsp;</td>
    </tr>
    <tr>
      <td width="50%">&nbsp;</td>
    </tr>
  </table>

  <br>
  <br>

  <table width="200" border="1" cellpadding="0" cellspacing="0">
    <tr>
      <td colspan="2">
        <div align="center">Título</div>
      </td>
    </tr>
    <tr>
      <td rowspan="2">&nbsp;</td>
      <td>&nbsp;</td>
    </tr>
    <tr>
      <td width="50%">&nbsp;</td>
    </tr>
  </table>

</body>
</html>
