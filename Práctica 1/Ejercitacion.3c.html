<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>
<body>
  <!-- Lista sin orden de tres elementos-->
  <ul>
    <li>xxx</li>
    <li>yyy</li>
    <li>zzz</li>
  </ul>
  <!-- Lista ordenada con tres elementos-->
  <ol>
    <li>xxx</li>
    <li>yyy</li>
    <li>zzz</li>
  </ol>

  <!-- Tres listas ordenadas cada una con un elemento-->
  <ol>
    <li>xxx</li>
  </ol>
  <ol>
    <li value="2">yyy</li>
  </ol>
  <ol>
    <li value="3">zzz</li>
  </ol>

  <!-- -->
  <blockquote>
    <p>1. xxx<br />
      2. yyy<br />
      3. zzz</p>
  </blockquote>

  
</body>
</html>
